<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progresso - Técnico em Desenvolvimento de Sistemas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍💻</text></svg>">

<style>
/* CSS ORIGINAL + LOGIN */
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
#conteudo-privado { display: none; } /* Escondido até login */

/* TELA DE LOGIN */
#login-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #004a8d, #f37021);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-box {
    background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center; width: 300px;
}
.login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
.login-box button { background: #004a8d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }

/* DASHBOARD */
.header { text-align: center; background: linear-gradient(90deg, #004a8d, #f37021); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
.previsao-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #856404; }
.geral-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
.progress-geral-bar { height: 30px; background-color: #e9ecef; border-radius: 15px; overflow: hidden; }
.progress-geral-fill { height: 100%; background-color: #004a8d; text-align: center; line-height: 30px; color: white; font-weight: bold; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
.card { background: white; padding: 20px; border-radius: 10px; border-left: 5px solid #ccc; position: relative; }
.card.concluido { border-left-color: #28a745; }
.card.andamento { border-left-color: #f37021; }
.card.pausado { border-left-color: #ffc107; }

.badge { float: right; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
.badge.concluido { background-color: #28a745; }
.badge.andamento { background-color: #f37021; }
.badge.pendente { background-color: #6c757d; }
.badge.pausado { background-color: #ffc107; color:#333; }
.modulo-tag { display: inline-block; background-color: #eef3f9; color: #004a8d; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
.info span { display:block; margin-bottom:5px; font-size: 13px; }
.progress-bar { height: 12px; background-color: #e9ecef; border-radius: 6px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background-color: #f37021; }
.card.concluido .progress-fill { background-color: #28a745; }
.status-text { text-align: right; font-weight: bold; font-size: 12px; margin-top: 5px; }

footer { text-align: center; background: linear-gradient(90deg, #004a8d, #f37021); color: white; padding: 20px; border-radius: 12px; margin-top: 40px; }
.btn-rodape { background:white; color:#004a8d; border:none; padding:10px 15px; border-radius:6px; margin:5px; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="Logotipo_SENAI.png" alt="SENAI" width="150" style="margin-bottom:15px">
        <h3>Acesso Restrito</h3>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="verificarLogin()">Entrar</button>
        <p id="erro" style="color:red; font-size:12px; display:none; margin-top:10px">Usuário ou senha incorretos!</p>
    </div>
</div>

<div id="conteudo-privado">
    <div class="header">
        <h1>💻 Técnico em Desenvolvimento de Sistemas</h1>
        <p>Instrutor: Luzardo Lustosa Silva</p>
    </div>

    <div class="previsao-box" id="previsaoBox">
        Calculando previsão de conclusão...
    </div>

    <div class="geral-container">
        <h2>Progresso Geral e Pendências</h2>
        <div id="pendenciasTexto" style="margin-bottom: 10px; font-size: 14px; color: #d9534f; font-weight: bold;"></div>
        <div class="progress-geral-bar">
            <div id="progressoGeral" class="progress-geral-fill">0%</div>
        </div>
    </div>

    <div id="disciplinasGrid" class="grid"></div>

    <footer>
        <p>Portal de Acompanhamento Acadêmico</p>
        <div class="footer-botoes">
            <button class="btn-rodape" onclick="window.open('https://luzardosenai.github.io/Serv/')">🌐 Portal</button>
            <button class="btn-rodape" onclick="window.open('https://drive.google.com/drive/folders/1A6K4GVMNo2o5m-9O4X2GWENy_IZSrj91?usp=drive_link')">📁 Materiais</button>
        </div>
    </footer>
</div>

<script>
const horasPorDia = 4;
const dataInicioCurso = new Date(2025, 7, 25);
let dataFinalPrevista = null;
let chPendenteTotal = 0;

const disciplinas = [
    { modulo:"Básico", nome:"📈 Introdução à Qualidade e Produtividade", carga:16, progressoManual: 100 },
    { modulo:"Básico", nome:"⛑️ Saúde e Segurança no Trabalho", carga:12, progressoManual: 100 },
    { modulo:"Básico", nome:"🏭 Introdução à Indústria 4.0", carga:24, progressoManual: 100 },
    { modulo:"Básico", nome:"📋 Introdução ao Desenvolvimento de Projetos", carga:12, progressoManual: 100 },
    { modulo:"Básico", nome:"🖥️ Introdução à Tecnologia da Informação e Comunicação", carga:40, progressoManual: 100 },
    { modulo:"Básico", nome:"♻️ Sustentabilidade nos processos industriais", carga:8, progressoManual: 100 },
    { modulo:"Introdutório", nome:"⚡ Fundamentos de Eletroeletrônica Aplicada", carga:100, progressoManual: 60, statusManual:"pausado" },
    { modulo:"Introdutório", nome:"🧠 Lógica de Programação", carga:220, progressoManual: 100 },
    { modulo:"Específico I", nome:"🌐 Internet das Coisas", carga:120, progressoManual: 46.6, statusManual:"pausado" },
    { modulo:"Específico I", nome:"📱 Programação de Aplicativos", carga:120, dataFixaInicio: new Date(2026, 3, 7) }, // 07/04/2026
    { modulo:"Específico I", nome:"🗄️ Banco de Dados", carga:120 },
    { modulo:"Específico II", nome:"⚙️ Desenvolvimento de Sistemas", carga:200 },
    { modulo:"Específico II", nome:"🔧 Manutenção de Sistemas", carga:30 },
    { modulo:"Específico II", nome:"📐 Modelagem de Sistemas", carga:88 },
    { modulo:"Específico II", nome:"🚀 Implantação de Sistemas", carga:30 },
    { modulo:"Específico II", nome:"🐛 Teste de Sistemas", carga:60 },
    { modulo:"Projeto Final", nome:"🏗️ Desenvolvimento de Projeto", carga:40 },
    { modulo:"Projeto Final", nome:"💡 Projeto de Pesquisa e Inovação", carga:60 }
];

function verificarLogin() {
    const user = document.getElementById('usuario').value;
    const pass = document.getElementById('senha').value;
    if(user === "Desenvolvimento" && pass === "senai") {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('conteudo-privado').style.display = 'block';
        render();
    } else {
        document.getElementById('erro').style.display = 'block';
    }
}

function ehDiaLetivo(data){
    const d = data.getDay();
    return d !== 0 && d !== 6;
}

function adicionarDiasUteis(data, dias){
    let dt = new Date(data), c = 0;
    while(c < dias){
        dt.setDate(dt.getDate() + 1);
        if(ehDiaLetivo(dt)) c++;
    }
    return dt;
}

// --- SUBSTITUA APENAS ESTA PARTE NO SEU SCRIPT ---

function render(){
    let cursor = new Date(dataInicioCurso);
    const hoje = new Date();
    const grid = document.getElementById("disciplinasGrid");
    grid.innerHTML = "";
    let horasAcumuladasTotal = 0;
    chPendenteTotal = 0;

    // 1. Primeiro passo: Calcular a CH pendente das pausadas
    disciplinas.forEach(d => {
        if(d.statusManual === "pausado") {
            chPendenteTotal += (d.carga * (100 - d.progressoManual) / 100);
        }
    });

    // 2. Renderizar as disciplinas e calcular cronograma
    disciplinas.forEach((disc, i) => {
        if(disc.dataFixaInicio) cursor = new Date(disc.dataFixaInicio);

        const diasNec = Math.ceil(disc.carga / horasPorDia);
        const inicio = new Date(cursor);
        const fim = adicionarDiasUteis(cursor, diasNec - 1);
        
        dataFinalPrevista = fim; 

        cursor = new Date(fim);
        cursor.setDate(cursor.getDate() + 1);

        let prog = 0;
        let status = "pendente";
        let statusTexto = "Não Iniciado";

        if(disc.progressoManual !== undefined){
            prog = disc.progressoManual;
            if(disc.statusManual === "pausado"){
                status = "pausado";
                statusTexto = "Pendente";
            } else {
                status = prog >= 100 ? "concluido" : "andamento";
                statusTexto = prog >= 100 ? "Concluído" : "Em Andamento";
            }
            horasAcumuladasTotal += (disc.carga * prog) / 100;
        } else {
            if(hoje < inicio) { status = "pendente"; statusTexto = "Não Iniciado"; }
            else if (hoje > fim) { prog = 100; status = "concluido"; statusTexto = "Concluído"; horasAcumuladasTotal += disc.carga; }
            else {
                let dPassados = 0;
                let temp = new Date(inicio);
                while(temp <= hoje){ if(ehDiaLetivo(temp)) dPassados++; temp.setDate(temp.getDate()+1); }
                prog = Math.min(99, Math.floor((dPassados / diasNec) * 100));
                status = "andamento"; statusTexto = "Em Andamento";
                horasAcumuladasTotal += (dPassados * horasPorDia);
            }
        }

        const card = document.createElement("div");
        card.className = `card ${status}`;
        card.innerHTML = `
            <span class="badge ${status}">${statusTexto}</span>
            <span class="modulo-tag">${disc.modulo}</span>
            <h3>${i+1}. ${disc.nome}</h3>
            <div class="info">
                <span>🕒 Carga: ${disc.carga}h</span>
                <span>📅 ${inicio.toLocaleDateString('pt-BR')} à ${fim.toLocaleDateString('pt-BR')}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
            <div class="status-text">${prog}%</div>
        `;
        grid.appendChild(card);
    });

    // 3. AJUSTE DA PREVISÃO REAL (Somando as horas pendentes ao final)
    const diasExtras = Math.ceil(chPendenteTotal / horasPorDia);
    const dataConclusaoReal = adicionarDiasUteis(new Date(dataFinalPrevista), diasExtras);

    // Atualiza Informações de Topo
    const totalCurso = 1300;
    const porcTotal = Math.floor((horasAcumuladasTotal / totalCurso) * 100);
    document.getElementById("progressoGeral").style.width = porcTotal + "%";
    document.getElementById("progressoGeral").innerText = porcTotal + "%";
 
    document.getElementById("previsaoBox").innerHTML = `
        🏁 Previsão de Conclusão (Com Pendências): <strong>${dataConclusaoReal.toLocaleDateString('pt-BR')}</strong><br>
        <span style="font-size:12px; font-weight:normal">Cálculo: Fim das UCs regulares + ${diasExtras} dias para quitar pendências.</span>
    `;
}
</script>
</body>
</html>
