<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progresso - Técnico em Desenvolvimento de Sistemas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍💻</text></svg>">

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 20px;
    color: #333;
  }
  .header {
    text-align: center;
    background: linear-gradient(90deg, #004a8d, #f37021);
    color: white;
    padding: 30px 20px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .header h1 { margin: 0 0 10px 0; }
  .header p { margin: 0; font-size: 16px; opacity: 0.9; }
  
  .geral-container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    margin-bottom: 30px;
  }
  .progress-geral-bar {
    height: 30px;
    background-color: #e9ecef;
    border-radius: 15px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-geral-fill {
    height: 100%;
    background-color: #004a8d;
    text-align: center;
    line-height: 30px;
    color: white;
    font-weight: bold;
    width: 0%;
    transition: width 0.5s ease;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    border-left: 5px solid #ccc;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card.concluido { border-left-color: #28a745; }
  .card.andamento { border-left-color: #f37021; }
  
  .modulo-tag {
    display: inline-block;
    background-color: #eef3f9;
    color: #004a8d;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .card h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #333;
    line-height: 1.3;
  }
  .info {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
  }
  .info span { display: block; margin-bottom: 5px; }
  
  .progress-bar {
    height: 15px;
    background-color: #e9ecef;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .progress-fill {
    height: 100%;
    background-color: #f37021;
    width: 0%;
  }
  .card.concluido .progress-fill { background-color: #28a745; }
  
  .status-text {
    text-align: right;
    font-size: 13px;
    font-weight: bold;
    color: #666;
  }
  .badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: white;
    float: right;
  }
  .badge.concluido { background-color: #28a745; }
  .badge.andamento { background-color: #f37021; }
  .badge.pendente { background-color: #6c757d; }

  /* Estilos do Rodapé */
  footer {
    text-align: center;
    background: linear-gradient(90deg, #004a8d, #f37021);
    color: white;
    padding: 30px 20px;
    border-radius: 12px;
    margin-top: 40px;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
  }
  footer p {
    margin: 0 0 15px 0;
    font-size: 16px;
  }
  .footer-botoes {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }
  .btn-rodape {
    background-color: white;
    color: #004a8d;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
  }
  .btn-rodape:hover {
    background-color: #333;
    color: white;
    transform: translateY(-2px);
  }

</style>
</head>
<body>

<div class="header">
  <h1>💻 Técnico em Desenvolvimento de Sistemas</h1>
  <p>Início: 25/08/2025 | Previsão de Conclusão Dinâmica com Feriados e Recessos</p>
  <p>Carga Horária Total: 1300 horas (4h/dia)</p>
</div>

<div class="geral-container">
  <h2>Progresso Geral do Curso</h2>
  <div class="progress-geral-bar">
    <div class="progress-geral-fill" id="progressoGeral">0%</div>
  </div>
</div>

<div class="grid" id="disciplinasGrid">
  </div>

<footer>
  <p>Curso desenvolvido por <strong>LUZARDO LUSTOSA SILVA</strong></p>
  <div class="footer-botoes">
    <button class="btn-rodape" onclick="window.open('https://luzardosenai.github.io/Serv/', '_blank')">🌐 Acessar Portal do Aluno</button>
    <button class="btn-rodape" onclick="window.open('https://drive.google.com/drive/', '_blank')">📁 Material de Apoio (Drive)</button>
  </div>
</footer>

<script>
  const horasPorDia = 4;
  const dataInicioCurso = new Date(2025, 7, 25); // 25 de Agosto de 2025
  
  // Grade Curricular com símbolos (emojis)
  const disciplinas = [
    { modulo: "Básico", nome: "📈 Introdução à Qualidade e Produtividade", carga: 16 },
    { modulo: "Básico", nome: "⛑️ Saúde e Segurança no Trabalho", carga: 12 },
    { modulo: "Básico", nome: "🏭 Introdução à Indústria 4.0", carga: 24 },
    { modulo: "Básico", nome: "📋 Introdução ao Desenvolvimento de Projetos", carga: 12 },
    { modulo: "Básico", nome: "🖥️ Introdução à Tecnologia da Informação e Comunicação", carga: 40 },
    { modulo: "Básico", nome: "♻️ Sustentabilidade nos processos industriais", carga: 8 },
    { modulo: "Introdutório", nome: "⚡ Fundamentos de Eletroeletrônica Aplicada", carga: 100 },
    { modulo: "Introdutório", nome: "🧠 Lógica de Programação", carga: 220 },
    { modulo: "Específico I", nome: "🌐 Internet das Coisas", carga: 120 },
    { modulo: "Específico I", nome: "📱 Programação de Aplicativos", carga: 120 },
    { modulo: "Específico I", nome: "🗄️ Banco de Dados", carga: 120 },
    { modulo: "Específico II", nome: "⚙️ Desenvolvimento de Sistemas", carga: 200 },
    { modulo: "Específico II", nome: "🔧 Manutenção de Sistemas", carga: 30 },
    { modulo: "Específico II", nome: "📐 Modelagem de Sistemas", carga: 88 },
    { modulo: "Específico II", nome: "🚀 Implantação de Sistemas", carga: 30 },
    { modulo: "Específico II", nome: "🐛 Teste de Sistemas", carga: 60 },
    { modulo: "Projeto Final", nome: "🏗️ Desenvolvimento de Projeto", carga: 40 },
    { modulo: "Projeto Final", nome: "💡 Projeto de Pesquisa e Inovação", carga: 60 }
  ];

  function ehDiaLetivo(data) {
    const dia = data.getDate();
    const mes = data.getMonth() + 1;
    const ano = data.getFullYear();
    const diaSemana = data.getDay();

    if (diaSemana === 0 || diaSemana === 6) return false;

    if (mes === 12 && dia >= 20) return false;
    if (mes === 1 && dia <= 5) return false;

    const dataFormatada = String(dia).padStart(2, '0') + '/' + String(mes).padStart(2, '0');
    const dataCompleta = dataFormatada + '/' + ano;

    const feriadosFixos = [
      '01/01', '21/04', '01/05', '14/08', '07/09', 
      '08/09', '12/10', '19/10', '02/11', '15/11', '25/12'
    ];
    if (feriadosFixos.includes(dataFormatada)) return false;

    const feriadosMoveis = [
      '16/02/2026', '17/02/2026', '03/04/2026', '04/06/2026',
      '08/02/2027', '09/02/2027', '26/03/2027', '27/05/2027'
    ];
    if (feriadosMoveis.includes(dataCompleta)) return false;

    return true; 
  }

  function adicionarDiasUteis(dataInicial, dias) {
    let dataAtual = new Date(dataInicial);
    
    while (!ehDiaLetivo(dataAtual)) {
      dataAtual.setDate(dataAtual.getDate() + 1);
    }

    let diasAdicionados = 0;
    while (diasAdicionados < dias) {
      dataAtual.setDate(dataAtual.getDate() + 1);
      if (ehDiaLetivo(dataAtual)) {
        diasAdicionados++;
      }
    }
    return dataAtual;
  }

  function contarDiasUteis(inicio, fim) {
    let dataAtual = new Date(inicio);
    dataAtual.setHours(0,0,0,0);
    let dataFim = new Date(fim);
    dataFim.setHours(0,0,0,0);
    
    let count = 0;
    while (dataAtual < dataFim) {
      if (ehDiaLetivo(dataAtual)) {
        count++;
      }
      dataAtual.setDate(dataAtual.getDate() + 1);
    }
    return count;
  }

  function formatarData(data) {
    return data.toLocaleDateString('pt-BR');
  }

  function renderizarDashboard() {
    const hoje = new Date(); 
    
    let diasUteisPassados = contarDiasUteis(dataInicioCurso, hoje);
    if (diasUteisPassados < 0) diasUteisPassados = 0;

    let cursorData = new Date(dataInicioCurso);
    let horasConcluidasTotais = 0;

    const grid = document.getElementById('disciplinasGrid');
    grid.innerHTML = '';

    disciplinas.forEach((disc, index) => {
      const diasNecessarios = disc.carga / horasPorDia;

      while (!ehDiaLetivo(cursorData)) {
        cursorData.setDate(cursorData.getDate() + 1);
      }
      const dataInicioDisc = new Date(cursorData);
      
      const dataFimDisc = adicionarDiasUteis(cursorData, diasNecessarios - 1);
      
      cursorData = new Date(dataFimDisc);
      cursorData.setDate(cursorData.getDate() + 1);

      let progresso = 0;
      let statusClasse = 'pendente';
      let statusTexto = 'Não Iniciado';

      if (diasUteisPassados >= diasNecessarios) {
        progresso = 100;
        statusClasse = 'concluido';
        statusTexto = 'Concluído';
        diasUteisPassados -= diasNecessarios;
        horasConcluidasTotais += disc.carga;
      } else if (diasUteisPassados > 0) {
        progresso = Math.floor((diasUteisPassados / diasNecessarios) * 100);
        statusClasse = 'andamento';
        statusTexto = 'Em Andamento';
        horasConcluidasTotais += (diasUteisPassados * horasPorDia);
        diasUteisPassados = 0; 
      }

      const card = document.createElement('div');
      card.className = `card ${statusClasse}`;
      card.innerHTML = `
        <div>
          <span class="badge ${statusClasse}">${statusTexto}</span>
          <span class="modulo-tag">${disc.modulo}</span>
          <h3>${index + 1}. ${disc.nome}</h3>
          <div class="info">
            <span>🕒 Carga: ${disc.carga}h (${diasNecessarios} dias úteis)</span>
            <span>📅 Início: ${formatarData(dataInicioDisc)}</span>
            <span>🏁 Fim: ${formatarData(dataFimDisc)}</span>
          </div>
        </div>
        <div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progresso}%"></div>
          </div>
          <div class="status-text">${progresso}%</div>
        </div>
      `;
      grid.appendChild(card);
    });

    const progressoGeral = Math.floor((horasConcluidasTotais / 1300) * 100);
    const barraGeral = document.getElementById('progressoGeral');
    barraGeral.style.width = progressoGeral + '%';
    barraGeral.innerText = progressoGeral + '%';
  }

  renderizarDashboard();
</script>

</body>
</html>
